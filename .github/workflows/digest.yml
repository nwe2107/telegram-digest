name: Weekly digest

on:
  schedule:
    - cron: "0 5 * * 5" # Fridays 05:00 UTC = 8am Israel summer / 7am winter
  workflow_dispatch:

permissions:
  contents: write

jobs:
  digest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: pip install -r requirements.txt
      - name: Restore Telethon session
        env:
          TG_SESSION_B64: ${{ secrets.TG_SESSION_B64 }}
        run: printf '%s' "$TG_SESSION_B64" | base64 -d > digest.session
      - name: Run digest
        env:
          TG_API_ID: ${{ secrets.TG_API_ID }}
          TG_API_HASH: ${{ secrets.TG_API_HASH }}
          TG_GROUP_ID: ${{ secrets.TG_GROUP_ID }}
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: python digest.py
      - name: Commit updated state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add state.txt
          if ! git diff --cached --quiet; then
            git commit -m "Update last-seen state"
            git push
          fi
